version: 2

project_name: kiroshi

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: kiroshi
    main: ./cmd/kiroshi
    binary: kiroshi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/ajardin/kiroshi/internal/version.version={{ .Version }}
      - -X github.com/ajardin/kiroshi/internal/version.commit={{ .ShortCommit }}
      - -X github.com/ajardin/kiroshi/internal/version.date={{ .CommitDate }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: kiroshi
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  format: "[{{ slice .SHA 0 7 }}](https://github.com/ajardin/kiroshi/commit/{{ .SHA }}) · {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Refactors
      regexp: "^.*refactor[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## kiroshi {{ .Tag }}
    See [CHANGELOG.md](https://github.com/ajardin/kiroshi/blob/main/CHANGELOG.md) for a curated summary.
  footer: |
    ---
    Built with [goreleaser](https://goreleaser.com/).

homebrew_casks:
  - name: kiroshi
    binaries:
      - kiroshi
    directory: Casks
    repository:
      owner: ajardin
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/ajardin/kiroshi
    description: GitHub pull request dashboard for the terminal
    caveats: |
      Run `kiroshi -init` to create your configuration (GitHub token, search query).
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kiroshi"]
